<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha Médica Infantil</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:#f2f2f2;
margin:0;
padding:12px;
}

.card{
max-width:520px;
margin:auto;
background:white;
border-radius:18px;
box-shadow:0 12px 30px rgba(0,0,0,0.15);
overflow:hidden;
}

.header{
position:relative;
text-align:center;
padding:30px 20px;
background:linear-gradient(135deg,#a0e4ff,#fddcf5);
}

.header::before{
content:"";
position:absolute;
top:0; left:0; right:0; bottom:0;
background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><circle cx="20" cy="20" r="6" fill="%23ffd700"/><circle cx="60" cy="60" r="4" fill="%23ff69b4"/><circle cx="80" cy="30" r="5" fill="%23ff4500"/></svg>');
background-repeat: repeat;
opacity:0.2;
z-index:0;
}

.photo{
    width:180px;     
    height:180px;   
    border-radius:50%;
    overflow:hidden;
    margin:auto;
    cursor:pointer;
    position:relative;
    z-index:1;
    border:5px solid #fff;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.15), 0 6px 14px rgba(0,0,0,0.25);
    transition: transform 0.2s;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

.photo:hover{
transform: scale(1.05);
}

.photo:after{
content:"Cambiar foto";
position:absolute;
bottom:0;
left:0;
right:0;
font-size:13px;
background:rgba(0,0,0,0.6);
color:white;
text-align:center;
}

h1{
margin:15px 0 5px;
font-size:28px;
position:relative;
z-index:1;
}

.age {
    font-size:18px;
    color:#000; /* negro para "Edad:" */
    position:relative;
    z-index:1;
}

.age span.editable {
    border-bottom:1px dashed #666;
    padding:0 4px;
    color:#000; /* negro para los guiones editables */
}

.alerts{
background:#FF0000;
color:white;
padding:20px;
border-radius:0 0 12px 12px;
position:relative;
z-index:1;
}

.alert{
margin-bottom:12px;
}

.label{
font-size:14px;
opacity:0.9;
}

.value{
font-size:22px;
font-weight:bold;
}

.section{
padding:20px;
border-top:1px solid #eee;
}

.section h2{
margin-top:0;
font-size:18px;
}

.item{
background:#fafafa;
padding:12px;
border-radius:8px;
margin-bottom:8px;
}

.contact{
background:#f4f4f4;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.callbtn{
margin-top:6px;
display:block;
background:#28a745;
color:white;
padding:10px;
border-radius:8px;
text-align:center;
text-decoration:none;
font-weight:bold;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:17px;
margin-top:12px;
cursor:pointer;
}

.print{
background:#FF0000;
color:white;
}

.location{
background:#007BFF;
color:white;
}

[contenteditable]{
outline:none;
}

@media print{
button{display:none}
}
</style>
</head>

<body>

<div class="card">

<div class="header">

<div class="photo" id="photoBox">
<img id="profileImage" src="https://via.placeholder.com/200">
</div>

<input type="file" id="photoInput" accept="image/*" style="display:none">

<h1 contenteditable="true" id="nombre">Nombre Apellidos</h1>
<div class="age">Edad: <span contenteditable="true" id="edad">___</span></div>

</div>

<div class="alerts">

<div class="alert">
<div class="label">ALERGIAS</div>
<div class="value" contenteditable="true" id="alergias">Ninguna</div>
</div>

<div class="alert">
<div class="label">GRUPO SANGUÍNEO</div>
<div class="value" contenteditable="true" id="sangre">O+</div>
</div>

</div>

<div class="section">

<h2>Contactos de Emergencia</h2>

<div class="contact">
<div contenteditable="true" id="ice1nombre">Nombre contacto</div>
<div contenteditable="true" id="ice1tel">600000000</div>
<a id="call1" class="callbtn">Llamar</a>
</div>

<div class="contact">
<div contenteditable="true" id="ice2nombre">Nombre contacto</div>
<div contenteditable="true" id="ice2tel">600000000</div>
<a id="call2" class="callbtn">Llamar</a>
</div>

</div>

<div class="section">

<h2>Patologías</h2>

<div class="item" contenteditable="true" id="pat1">Añadir patología</div>
<div class="item" contenteditable="true" id="pat2"></div>

</div>

<div class="section">

<h2>Medicación</h2>

<div class="item" contenteditable="true" id="med1">Añadir medicación</div>
<div class="item" contenteditable="true" id="med2"></div>

</div>

</div>

<button class="location" onclick="sendLocation()">Compartir ubicación</button>
<button class="print" onclick="window.print()">Guardar PDF</button>

<script>

const fields = document.querySelectorAll("[contenteditable]");

fields.forEach(f=>{
let saved = localStorage.getItem(f.id);
if(saved) f.innerText = saved;

f.addEventListener("input",()=>{
localStorage.setItem(f.id,f.innerText);
updateCalls();
});
});

function updateCalls(){
let tel1 = document.getElementById("ice1tel").innerText;
let tel2 = document.getElementById("ice2tel").innerText;

document.getElementById("call1").href="tel:"+tel1;
document.getElementById("call2").href="tel:"+tel2;
}

updateCalls();

const photoBox=document.getElementById("photoBox");
const photoInput=document.getElementById("photoInput");
const profileImage=document.getElementById("profileImage");

let savedPhoto=localStorage.getItem("photo");
if(savedPhoto) profileImage.src=savedPhoto;

photoBox.onclick=()=>photoInput.click();

photoInput.onchange=function(){
const file=this.files[0];
if(!file)return;

const reader=new FileReader();
reader.onload=function(e){
profileImage.src=e.target.result;
localStorage.setItem("photo",e.target.result);
};
reader.readAsDataURL(file);
};

function sendLocation(){

if(!navigator.geolocation){
alert("GPS no disponible");
return;
}

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

let url=`https://maps.google.com/?q=${lat},${lon}`;

alert("Ubicación:\n"+url);

});

}

</script>

</body>
</html>
